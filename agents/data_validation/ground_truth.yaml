# ground_truth.yaml — Known coaching tenures and relationships for A1 validation.
#
# Each entry is a single verifiable fact about a coach's tenure or mentored
# relationship.  validate.py checks each fact against the live Neo4j graph
# and reports any discrepancies.
#
# Fields:
#   type: "tenure" | "mentored" | "not_mentored"
#   coach:       McIllece name or partial name (matched case-insensitively)
#   team:        School name as it appears in Neo4j (Team.school)
#   role:        Role abbreviation (HC, OC, DC, etc.)
#   start_year:  First expected year for this tenure (inclusive)
#   end_year:    Last expected year for this tenure (inclusive)
#   mentor:      Name of the mentor coach (for "mentored" entries)
#   mentee:      Name of the mentee coach (for "mentored" entries)
#   rationale:   Human-readable justification for the expected result

